version: 1
description: >
  Import order for CPG files from outdir. Nodes are imported first, then edges
  by priority/weight. Intended for resilient and optimized import pipeline.

source_dir: outdir

nodes_first: true

phases:
  - name: nodes_all
    kind: nodes
    files:
      - nodes_META_DATA_cypher.csv
      - nodes_NAMESPACE_cypher.csv
      - nodes_DEPENDENCY_cypher.csv
      - nodes_FILE_cypher.csv
      - nodes_NAMESPACE_BLOCK_cypher.csv
      - nodes_UNKNOWN_cypher.csv
      - nodes_MODIFIER_cypher.csv
      - nodes_BINDING_cypher.csv
      - nodes_CONFIG_FILE_cypher.csv
      - nodes_TYPE_REF_cypher.csv
      - nodes_CONTROL_STRUCTURE_cypher.csv
      - nodes_IMPORT_cypher.csv
      - nodes_RETURN_cypher.csv
      - nodes_METHOD_REF_cypher.csv
      - nodes_METHOD_RETURN_cypher.csv
      - nodes_TAG_cypher.csv
      - nodes_METHOD_PARAMETER_OUT_cypher.csv
      - nodes_TYPE_cypher.csv
      - nodes_MEMBER_cypher.csv
      - nodes_METHOD_PARAMETER_IN_cypher.csv
      - nodes_TYPE_DECL_cypher.csv
      - nodes_METHOD_cypher.csv
      - nodes_CLOSURE_BINDING_cypher.csv
      - nodes_FIELD_IDENTIFIER_cypher.csv
      - nodes_LITERAL_cypher.csv
      - nodes_LOCAL_cypher.csv
      - nodes_BLOCK_cypher.csv
      - nodes_IDENTIFIER_cypher.csv
      - nodes_CALL_cypher.csv

  - name: edges_essential_light
    kind: edges
    files:
      - edges_CONDITION_cypher.csv
      - edges_BINDS_cypher.csv
      - edges_IS_CALL_FOR_IMPORT_cypher.csv
      - edges_INHERITS_FROM_cypher.csv
      - edges_CAPTURE_cypher.csv
      - edges_PARAMETER_LINK_cypher.csv
      - edges_SOURCE_FILE_cypher.csv
      - edges_RECEIVER_cypher.csv

  - name: edges_essential_heavy
    kind: edges
    files:
      - edges_REF_cypher.csv
      - edges_ARGUMENT_cypher.csv
      - edges_CALL_cypher.csv
      - edges_CONTAINS_cypher.csv
      - edges_AST_cypher.csv
      - edges_EVAL_TYPE_cypher.csv

  - name: edges_medium_necessity
    kind: edges
    files:
      - edges_CDG_cypher.csv
      - edges_CFG_cypher.csv

  - name: edges_rest
    kind: edges
    files:
      - edges_TAGGED_BY_cypher.csv

excluded:
  - edges_REACHING_DEF_cypher.csv
  - edges_DOMINATE_cypher.csv
  - edges_POST_DOMINATE_cypher.csv
